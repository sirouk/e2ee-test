services:
  - type: web
    name: chutes-e2ee-test
    runtime: static
    buildCommand: npm ci && E2EE_PRECOMPILED_WASM=1 npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: checksPass
    headers:
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; base-uri 'none'; child-src 'none'; connect-src 'self' https://api.chutes.ai https://llm.chutes.ai; font-src 'self'; form-action 'none'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data:; manifest-src 'none'; media-src 'none'; object-src 'none'; script-src 'self' 'wasm-unsafe-eval'; script-src-attr 'none'; style-src 'self'; style-src-attr 'none'; worker-src 'none'; require-trusted-types-for 'script'; trusted-types default
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
