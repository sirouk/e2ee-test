<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Chutes E2EE browser flow</title>
  <desc id="desc">A three-lane diagram showing the browser, Chutes API relay, and TEE instance E2EE workflow.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c211f" stroke-width="1"/>
    </pattern>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171c19"/>
      <stop offset="1" stop-color="#0f1211"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#a4ffc5"/>
      <stop offset="1" stop-color="#d9ffbd"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 10 6 L 2 10 Z" fill="#a4ffc5"/>
    </marker>
    <style>
      .bg { fill: #0b0d0c; }
      .grid { fill: url(#grid); opacity: .65; }
      .title { fill: #f5f7f3; font-family: Arial, sans-serif; font-size: 42px; font-weight: 700; }
      .subtitle { fill: #a9b2ac; font-family: Arial, sans-serif; font-size: 18px; }
      .lane { fill: url(#panel); stroke: #303833; stroke-width: 1.5; rx: 20; }
      .laneTitle { fill: #f5f7f3; font-family: Arial, sans-serif; font-size: 25px; font-weight: 700; }
      .laneSub { fill: #8f9993; font-family: Arial, sans-serif; font-size: 15px; }
      .step { fill: #121614; stroke: #3a443f; stroke-width: 1.2; rx: 14; }
      .stepText { fill: #e8eee9; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .stepSub { fill: #9ba59f; font-family: Arial, sans-serif; font-size: 14px; }
      .num { fill: #09100c; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .numCircle { fill: url(#accent); }
      .arrow { fill: none; stroke: #a4ffc5; stroke-width: 3; marker-end: url(#arrow); }
      .arrowSoft { fill: none; stroke: #6fdca1; stroke-width: 2.4; stroke-dasharray: 7 8; marker-end: url(#arrow); opacity: .9; }
      .arrowLabel { fill: #a4ffc5; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .2px; }
      .callout { fill: #101412; stroke: #5a7d69; stroke-width: 1.5; rx: 16; }
      .calloutTitle { fill: #a4ffc5; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .calloutText { fill: #dbe5df; font-family: Arial, sans-serif; font-size: 14px; }
      .muted { fill: #77817b; font-family: Arial, sans-serif; font-size: 13px; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="900"/>
  <rect class="grid" width="1280" height="900"/>

  <text class="title" x="60" y="74">Chutes E2EE Browser Flow</text>
  <text class="subtitle" x="60" y="106">The browser handles keys and crypto locally; Chutes routes encrypted bytes to the selected TEE instance.</text>

  <rect class="lane" x="60" y="150" width="340" height="560" rx="20"/>
  <rect class="lane" x="470" y="150" width="340" height="560" rx="20"/>
  <rect class="lane" x="880" y="150" width="340" height="560" rx="20"/>

  <text class="laneTitle" x="92" y="198">Browser app</text>
  <text class="laneSub" x="92" y="222">TypeScript UI + Rust/WASM crypto</text>
  <text class="laneTitle" x="502" y="198">Chutes API</text>
  <text class="laneSub" x="502" y="222">Discovery, nonce check, encrypted relay</text>
  <text class="laneTitle" x="912" y="198">TEE instance</text>
  <text class="laneSub" x="912" y="222">Plaintext exists only inside the enclave path</text>

  <rect class="step" x="92" y="252" width="276" height="72" rx="14"/>
  <circle class="numCircle" cx="120" cy="288" r="15"/>
  <text class="num" x="116" y="293">1</text>
  <text class="stepText" x="146" y="281">Load TEE models</text>
  <text class="stepSub" x="146" y="305">GET llm.chutes.ai/v1/models</text>

  <rect class="step" x="92" y="362" width="276" height="78" rx="14"/>
  <circle class="numCircle" cx="120" cy="401" r="15"/>
  <text class="num" x="116" y="406">2</text>
  <text class="stepText" x="146" y="393">Get instance + nonce</text>
  <text class="stepSub" x="146" y="417">e2e_pubkey, instance_id, nonce</text>

  <rect class="step" x="92" y="480" width="276" height="92" rx="14"/>
  <circle class="numCircle" cx="120" cy="526" r="15"/>
  <text class="num" x="116" y="531">3</text>
  <text class="stepText" x="146" y="514">Encrypt request locally</text>
  <text class="stepSub" x="146" y="538">ML-KEM + HKDF + gzip</text>
  <text class="stepSub" x="146" y="558">ChaCha20-Poly1305 blob</text>

  <rect class="step" x="92" y="616" width="276" height="66" rx="14"/>
  <circle class="numCircle" cx="120" cy="649" r="15"/>
  <text class="num" x="116" y="654">9</text>
  <text class="stepText" x="146" y="641">Decrypt response</text>
  <text class="stepSub" x="146" y="665">tokens never leave the browser</text>

  <rect class="step" x="502" y="276" width="276" height="78" rx="14"/>
  <circle class="numCircle" cx="530" cy="315" r="15"/>
  <text class="num" x="526" y="320">4</text>
  <text class="stepText" x="556" y="307">POST /e2e/invoke</text>
  <text class="stepSub" x="556" y="331">encrypted body + E2EE headers</text>

  <rect class="step" x="502" y="414" width="276" height="78" rx="14"/>
  <circle class="numCircle" cx="530" cy="453" r="15"/>
  <text class="num" x="526" y="458">5</text>
  <text class="stepText" x="556" y="445">Validate nonce</text>
  <text class="stepSub" x="556" y="469">single-use instance routing</text>

  <rect class="step" x="502" y="548" width="276" height="78" rx="14"/>
  <circle class="numCircle" cx="530" cy="587" r="15"/>
  <text class="num" x="526" y="592">6</text>
  <text class="stepText" x="556" y="579">Relay encrypted bytes</text>
  <text class="stepSub" x="556" y="603">API never sees prompt text</text>

  <rect class="step" x="912" y="318" width="276" height="96" rx="14"/>
  <circle class="numCircle" cx="940" cy="366" r="15"/>
  <text class="num" x="936" y="371">7</text>
  <text class="stepText" x="966" y="354">Decrypt inside TEE</text>
  <text class="stepSub" x="966" y="378">recover prompt + response_pk</text>
  <text class="stepSub" x="966" y="400">run selected model</text>

  <rect class="step" x="912" y="520" width="276" height="96" rx="14"/>
  <circle class="numCircle" cx="940" cy="568" r="15"/>
  <text class="num" x="936" y="573">8</text>
  <text class="stepText" x="966" y="556">Encrypt response</text>
  <text class="stepSub" x="966" y="580">stream: e2e_init + e2e chunks</text>
  <text class="stepSub" x="966" y="602">non-stream: encrypted blob</text>

  <path class="arrowSoft" d="M 368 288 H 458"/>
  <text class="arrowLabel" x="390" y="274">model list</text>

  <path class="arrowSoft" d="M 368 401 H 458"/>
  <text class="arrowLabel" x="388" y="387">instance nonce</text>

  <path class="arrow" d="M 368 526 H 430 V 315 H 502"/>
  <text class="arrowLabel" x="384" y="506">encrypted request</text>

  <path class="arrow" d="M 640 354 V 414"/>
  <text class="arrowLabel" x="658" y="390">nonce check</text>

  <path class="arrow" d="M 778 587 H 835 V 366 H 912"/>
  <text class="arrowLabel" x="792" y="566">encrypted relay</text>

  <path class="arrow" d="M 1050 414 V 520"/>
  <text class="arrowLabel" x="1068" y="472">model output</text>

  <path class="arrow" d="M 912 568 H 838 V 690 H 402 V 649 H 368"/>
  <text class="arrowLabel" x="512" y="676">encrypted response stream returns to the browser</text>

  <rect class="callout" x="60" y="748" width="548" height="86" rx="16"/>
  <text class="calloutTitle" x="88" y="784">Never sent by the browser</text>
  <text class="calloutText" x="88" y="812">response_sk stays in WASM memory and is zeroed after the response.</text>

  <rect class="callout" x="672" y="748" width="548" height="86" rx="16"/>
  <text class="calloutTitle" x="700" y="784">What Chutes receives</text>
  <text class="calloutText" x="700" y="812">API key for authorization, routing headers, and encrypted E2EE bytes.</text>

  <text class="muted" x="60" y="872">Request blob: ML-KEM ciphertext + nonce + ChaCha20-Poly1305 ciphertext/tag. Stream response: e2e_init establishes stream key, e2e chunks carry encrypted SSE lines.</text>
</svg>
